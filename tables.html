<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exercise</title>

<style>
body {
  background-color: #eee;
  font-family: "Times New Roman", serif;
}

/* 外框 */
.container {
  width: 700px;
  margin: 50px auto;
  padding: 20px;
  background-color: white;
  box-shadow: 2px 2px 8px gray;
  position: relative;
}

/* 表格 */
table {
  border-collapse: collapse;
  width: auto;
}

/* 表頭 */
th {
  background-color: gray;
  color: white;
}

/* 表格內容 + 粗邊框 */
th, td {
  padding: 10px;
  border: 2px solid black; 
}

/* 交錯顏色 */
tr:nth-child(odd) td {
  background-color: white;
}

tr:nth-child(even) td {
  background-color: yellow;
}

/* 右上角方框 */
.fixed-box {
  position: absolute;
  top: 20px;
  right: 20px;
  border: 3px solid green;
  padding: 4px;
  width: 180px;
  background-color: white;
}
</style>

</head>

<body>

<div class="container">

  <!-- 表格 -->
  <table>
    <tr>
      <th>Firstname</th>
      <th>Lastname</th>
    </tr>
    <tr>
      <td>1</td>
      <td>1</td>
    </tr>
    <tr>
      <td>2</td>
      <td>2</td>
    </tr>
    <tr>
      <td>3</td>
      <td>3</td>
    </tr>
  </table>

  <!-- 右上角方框 -->
  <div class="fixed-box">
    This div element has position: fixed;
  </div>

</div>

</body>
</html>
