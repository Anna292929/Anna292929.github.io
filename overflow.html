<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exercise</title>

<style>
body {
  background-color: #eee;
  font-family: "Times New Roman", serif;
}

/* 外框 */
.container {
  width: 700px;
  margin: 50px auto;
  padding: 20px;
  background-color: white;
  box-shadow: 2px 2px 10px gray;
  position: relative;
}

/* 表格 */
table {
  border-collapse: collapse;
  width: auto;
}

/* 表頭 */
th {
  background-color: gray;
  color: white;
}

/* 表格內容 */
th, td {
  padding: 12px;
  border: 3px solid black;
  text-align: left;
}

/* 交錯列 */
tr:nth-child(even) td {
  background-color: yellow;
}

tr:nth-child(odd) td {
  background-color: white;
}

/* 右側區塊 */
.fixed-box {
  position: absolute;
  top: 20px;
  right: 20px;
  border: 3px solid green;
  padding: 15px;
  width: 200px;
  background-color: white;
  line-height: 1.5;
}
</style>

</head>

<body>

<div class="container">

  <!-- 左邊表格 -->
  <table>
    <tr>
      <th>Firstname</th>
      <th>Lastname</th>
    </tr>
    <tr>
      <td>1</td>
      <td>1</td>
    </tr>
    <tr>
      <td>2</td>
      <td>2</td>
    </tr>
    <tr>
      <td>3</td>
      <td>3</td>
    </tr>
  </table>

  <!-- 右邊方框 -->
  <div class="fixed-box">
    This div element<br>
    has position: fixed;
  </div>

</div>

</body>
</html>
