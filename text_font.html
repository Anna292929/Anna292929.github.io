<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exercise 18</title>

<style>
    body{
        font-family:"Times New Roman", serif;
        background:white;
    }

    .outer{
        width:620px;
        margin:20px;
        padding:10px;
        background:white;
        border:1px solid #ccc;
        box-shadow:0 0 10px gray;
    }

    h1{
        display:inline-block;
        font-size:46px;
        font-weight:bold;
        color:black;
        text-shadow:3px 3px pink;
        border-top:6px solid black;
        box-shadow:0 -3px 0 pink;
        padding-top:6px;
        margin:0 0 25px 0;
    }

    h2{
        width:600px;
        border:2px solid yellow;
        padding:2px;
        margin:0 0 25px 0;
    }

    h2 span{
        display:block;
        border:1px solid black;
        font-size:24px;
        font-style:italic;
        font-weight:bold;
        padding:3px 4px;
    }

    h3{
        font-size:22px;
        font-weight:bold;
        text-decoration:underline;
        text-align:right;
        margin:0;
    }
</style>

</head>
<body>

<div class="outer">

    <h1>This is heading 1</h1>

    <h2><span>This is heading 2</span></h2>

    <h3>This is heading 3</h3>

</div>

</body>
</html>
