<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exercise 18</title>
<style>
    body{
        font-family:"Times New Roman", serif;
        background:#ffffff;
    }

    .outer{
        width:620px;
        margin:20px;
        padding:10px;
        background:white;
        border:1px solid #d0d0d0;
        box-shadow: 0 0 15px 2px gray;
    }

    .h1box{
        position:relative;
        display:inline-block;
        margin:0 0 28px 0;
        padding-top:12px;
    }

    .h1box::before{
        content:"";
        position:absolute;
        top:0;
        left:0;
        width:calc(100% + 6px);
        height:5px;
        background:black;
        box-shadow:0 3px 0 pink;
    }

    h1{
        margin:0;
        font-size:48px;
        font-weight:bold;
        color:black;
        text-shadow:4px 4px pink;
        line-height:1;
    }

    h2{
    margin:0 0 25px 0;
    width:600px;
    border-top:2px solid yellow;
    border-left:2px solid yellow;
    border-right:3px ridge yellow;
    border-bottom:3px ridge yellow;
    } 
    
    h2 span{
        display:block;
        border:1px solid black;
        font-size:24px;
        font-style:italic;
        font-weight:bold;
        padding:4px 3px;
    }

    h3{
        margin:0;
        font-size:22px;
        font-weight:bold;
        text-decoration:underline;
        text-align:right;
    }
</style>
</head>
<body>

<div class="outer">
    <div class="h1box">
        <h1>This is heading 1</h1>
    </div>

    <h2><span>This is heading 2</span></h2>

    <h3>This is heading 3</h3>
</div>

</body>
</html>
