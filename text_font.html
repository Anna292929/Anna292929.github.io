<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exercise 18</title>

<style>
    body{
        background-color:white;
        font-family:"Times New Roman", serif;
    }

    .box{
        width:620px;
        background-color:#e6e6e6;
        padding:10px;
        margin:20px;
    }

    h1{
        font-size:48px;
        font-weight:bold;
        color:black;
        text-shadow:3px 3px pink;
        border-top:6px solid black;
        display:inline-block;
        margin:0 0 25px 0;
        padding-top:5px;
    }

    h2{
        font-size:28px;
        font-style:italic;
        font-weight:bold;
        color:black;
        border:2px solid yellow;
        padding:4px;
        margin:0 0 25px 0;
        width:590px;
        box-sizing:border-box;
    }

    h3{
        font-size:24px;
        font-weight:bold;
        color:black;
        text-decoration:underline;
        text-align:right;
        margin:0;
    }
</style>

</head>
<body>

<div class="box">
    <h1>This is heading 1</h1>
    <h2>This is heading 2</h2>
    <h3>This is heading 3</h3>
</div>

</body>
</html>
