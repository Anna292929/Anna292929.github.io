<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exercise 18</title>

<style>
    body{
        background-color:white;
        font-family:"Times New Roman", serif;
    }

    .outer{
        width:640px;
        border:2px solid black;
        margin:20px;
        padding:10px;
        background-color:white;
        box-shadow:0 0 10px gray;
    }

    h1{
        font-size:48px;
        font-weight:bold;
        color:black;
        text-shadow:3px 3px pink;
        border-top:6px solid black;
        box-shadow:0 -3px 0 pink inset;
        display:inline-block;
        margin:0 0 25px 0;
        padding-top:5px;
    }

    h2{
        border:2px solid yellow;
        padding:2px;
        margin:0 0 25px 0;
        width:590px;
    }

    h2 span{
        display:block;
        border:1px solid black;
        font-size:28px;
        font-style:italic;
        font-weight:bold;
        padding:4px;
    }

    h3{
        font-size:24px;
        font-weight:bold;
        color:black;
        text-decoration:underline;
        text-align:right;
        margin:0;
    }
</style>

</head>
<body>

<div class="outer">

    <h1>This is heading 1</h1>

    <h2>
        <span>This is heading 2</span>
    </h2>

    <h3>This is heading 3</h3>

</div>

</body>
</html>
