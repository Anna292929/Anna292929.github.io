<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exercise 18</title>
<style>
    body{
        font-family:"Times New Roman", serif;
        background:#ffffff;
    }

    .outer{
        width:820px;
        margin:20px;
        padding:20px;
        background:#f5f5f5;
        border:1px solid #d0d0d0;
        box-shadow:0 0 18px 3px gray;
    }

    .h1box{
        position:relative;
        display:inline-block;
        margin-bottom:50px;
        padding-top:12px;
    }

    .h1box::before{
        content:"";
        position:absolute;
        top:0;
        left:0;
        width:100%;
        height:5px;
        background:black;
        box-shadow:4px 4px pink;
    }

    h1{
        margin:0;
        font-size:72px;
        font-weight:bold;
        color:black;
        text-shadow:4px 4px pink;
        line-height:1;
    }

    h2{
        margin:0 0 70px 0;
        width:780px;
        padding:4px;
        border-top:4px solid yellow;
        border-left:4px solid yellow;
        border-right:4px solid olive;
        border-bottom:4px solid olive;
        background:transparent;
    }

    h2 span{
        display:block;
        border:2px solid black;
        background:#f5f5f5;
        font-size:52px;
        font-style:italic;
        font-weight:bold;
        padding:8px 10px;
    }

    h3{
        margin:0;
        font-size:48px;
        font-weight:bold;
        text-decoration:underline;
        text-align:right;
    }
</style>
</head>
<body>

<div class="outer">
    <div class="h1box">
        <h1>This is heading 1</h1>
    </div>

    <h2><span>This is heading 2</span></h2>

    <h3>This is heading 3</h3>
</div>

</body>
</html>
