<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Exercise 11</title>
    <style>
        .label-text {
            font-family: "Times New Roman", serif;
            font-size: 24px;
        }

        input[type="text"] {
            width: 400px;
            height: 40px;
            font-size: 24px;
        }

        input[type="submit"] {
            font-size: 24px;
        }

        input[type="reset"] {
            font-size: 24px;
            font-family: "Times New Roman", serif;
        }
    </style>
</head>
<body>

<form>
    <span class="label-text">First name:</span><br>
    <input type="text" value="Your first name"><br><br>

    <span class="label-text">Last name:</span><br>
    <input type="text" value="Your last name"><br><br>

    <span class="label-text">Student ID:</span><br>
    <input type="text" value="Your student ID"><br><br><br>

    <input type="submit" value="Submit">
    <input type="reset" value="重設">
</form>

</body>
</html>
