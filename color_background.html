<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exercise 16</title>

<style>
body {
  background-color: black;
}

/* 外框 
div.container {
  background-color: lightgray;
  width: 600px;
  margin: auto;
  padding: 20px;
}
*/
  
/* 第一個 */
div.box1 {
  background-color: lightblue;
  border-style: double;
  border-width: 7px;
  border-color: red;
  margin-bottom: 20px;
}

/* 第二個 */
div.box2 {
  background-color: yellow;
  border-style: solid;
  border-width: 3px;
  border-color: lightblue;
  border-radius: 10px;
  margin-bottom: 20px;
}

/* 第三個 */
div.box3 {
  background-color: seagreen;
  border-style: dotted;
  border-width: thick;
  border-color: gray;
}

h1 {
  margin: 0;
  font-family: "Times New Roman", serif;
}
</style>

</head>

<body>

<div class="container">

  <div class="box1">
    <h1>Hello World</h1>
  </div>

  <div class="box2">
    <h1>Hello World</h1>
  </div>

  <div class="box3">
    <h1>Hello World</h1>
  </div>

</div>

</body>
</html>
