<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exercise 16</title>

<style>
body {
  background-color: white;
}

div.container {
  background-color: white;
  width: 600px;
  margin: auto;
  padding: 20px;
  box-shadow: 5px 5px 10px gray;
}
  
div.box1 {
  background-color: lightblue;
  border-style: double;
  border-width: 8px;
  border-color: #cc0000;
  margin-bottom: 20px;
}

div.box2 {
  background-color: yellow;
  border-style: solid;
  border-width: 3px;
  border-color: #3399ff;
  border-radius: 10px;
  margin-bottom: 20px;
}

div.box3 {
  background-color: #2e8b57;
  border-style: dotted;
  border-width: 10px;
  border-color: gray;
}

h1 {
  margin: 0;
  font-family: "Times New Roman", serif;
}
</style>

</head>

<body>

<div class="container">

  <div class="box1">
    <h1>Hello World</h1>
  </div>

  <div class="box2">
    <h1>Hello World</h1>
  </div>

  <div class="box3">
    <h1>Hello World</h1>
  </div>

</div>

</body>
</html>
