<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hello World Styles</title>

<style>
body {
  background-color: black;
  font-family: "Times New Roman", serif;
}

/* Container */
.container {
  width: 600px;
  margin: 40px auto;
  background-color: #e6e6e6;
  padding: 20px;
}

/* Top box */
.box1 {
  background-color: #9ec3d6;
  border: 6px double red;
  padding: 10px;
  margin-bottom: 20px;
}

/* Middle box */
.box2 {
  background-color: yellow;
  border: 3px solid blue;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 20px;
}

/* Bottom box */
.box3 {
  background-color: #5aa37a;
  border: 6px dotted gray;
  padding: 10px;
}

/* Text style */
h1 {
  margin: 0;
}
</style>

</head>

<body>

<div class="container">

  <div class="box1">
    <h1>Hello World</h1>
  </div>

  <div class="box2">
    <h1>Hello World</h1>
  </div>

  <div class="box3">
    <h1>Hello World</h1>
  </div>

</div>

</body>
</html>
